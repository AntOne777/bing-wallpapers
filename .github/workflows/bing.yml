name: Fetch Bing WallpapersDaily

on:
  schedule:
    - cron: '0 0 * * *' # Запуск каждый день в 00:00 UTC
  workflow_dispatch: # Позволит запускать вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Явно требуем права на запись файлов
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run script
      run: python fetch_bing.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.json
        git commit -m "Update wallpapers data" || exit 0
        git push
