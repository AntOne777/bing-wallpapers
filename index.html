<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетка</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 40px; color: #f5f5f5; font-size: 28px; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 0 10px; }
        .card { background: #1e1e1e; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 12px rgba(0,0,0,0.5); transition: transform 0.25s ease, box-shadow 0.25s ease; cursor: zoom-in; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,120,212,0.3); }
        .card img { width: 100%; height: 220px; object-fit: cover; background: #252525; display: block; }
        #no-data { text-align: center; color: #888; font-size: 18px; margin-top: 5px; display: none; }

        .lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); opacity: 0; transition: opacity 0.3s ease; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox-img { max-width: 95%; max-height: 90%; object-fit: contain; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.8); transform: scale(0.95); transition: transform 0.3s ease; }
        .lightbox.active .lightbox-img { transform: scale(1); }
        .lightbox-close { position: absolute; top: 20px; right: 25px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; user-select: none; }
        .lightbox-close:hover { color: #0078d4; }
    </style>
</head>
<body>

    <h1>Сетка</h1>
    
    <div id="no-data">В архиве пока нет сохраненных обоев.</div>
    <div class="grid" id="gallery"></div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Полноэкранный просмотр">
    </div>

    <script>
        fetch('data.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                const noData = document.getElementById('no-data');
                const keys = Object.keys(data);

                if (keys.length === 0) {
                    noData.style.display = 'block';
                    return;
                }

                keys.forEach(key => {
                    const item = data[key];
                    if (!item) return;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('onclick', `openLightbox('${item.url}')`);
                    card.innerHTML = `<img src="${item.url}" alt="Bing Wallpaper" loading="lazy">`;
                    gallery.appendChild(card);
                });
            })
            .catch(err => {
                print("Ошибка при чтении базы данных:", err);
            });

        function openLightbox(url) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = url;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
