<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Личный архив Bing Wallpaper UHD">
    <meta name="theme-color" content="#121212">
    <title>Горизонт | Bing Archive</title>

    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 20px; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            min-height: 100vh; color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        h1 { 
            text-align: center; margin: 60px 0; font-weight: 200; 
            letter-spacing: .5em; text-transform: uppercase; font-size: 32px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { 
            position: relative; overflow: hidden; border-radius: 8px; 
            background: #1e1e1e; cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }

        .card:hover { transform: scale(1.02); }

        .card img { 
            width: 100%; height: 220px; object-fit: cover; 
            opacity: 0; transition: opacity 0.5s ease; display: block; 
        }
        .card img.loaded { opacity: 1; }
        
        .overlay { position: absolute; inset: 0; z-index: 10; }
        
        .lightbox { 
            position: fixed; inset: 0; display: none; background: rgba(0,0,0,.95); 
            justify-content: center; align-items: center; flex-direction: column; z-index: 1000;
        }
        .lightbox.active { display: flex; }
        
        .lightbox img { 
            max-width: 95%; max-height: 80%; object-fit: contain; 
            user-select: none; -webkit-user-drag: none; pointer-events: auto;
        }
        
        .close { 
            position: absolute; right: 35px; top: 35px; width: 50px; height: 50px; 
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50%; cursor: pointer; display: flex; 
            justify-content: center; align-items: center; backdrop-filter: blur(12px); 
            transition: all 0.3s ease; padding: 0; margin: 0;
        }

        .close:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); }

        .close svg {
            width: 20px; height: 20px; stroke: white;
            stroke-width: 2; fill: none;
            stroke-linecap: round; stroke-linejoin: round;
            display: block;
        }

        .controls { margin-top: 20px; }
        
        button { 
            background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.25);
            padding: 14px 34px; border-radius: 50px; cursor: pointer; font-size: 14px;
            font-weight: 200; letter-spacing: 0.5em; text-transform: uppercase;
            backdrop-filter: blur(12px); transition: all 0.35s ease;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        
        button:hover { 
            background: rgba(0,120,212,0.85); border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,120,212,0.35);
        }
        
        button:active { transform: scale(0.98); }
        button.loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>

    <h1>Горизонт</h1>
    <div class="grid" id="gallery"></div>

    <div class="lightbox" id="viewer">
        <button class="close" id="close">
            <svg viewBox="0 0 24 24" shape-rendering="crispEdges">
                <path d="M 7 7 L 17 17 M 17 7 L 7 17" />
            </svg>
        </button>
        <img id="bigImage">
        <div class="controls">
            <button id="download">Скачать UHD</button>
        </div>
    </div>

    <script>
        const gallery = document.getElementById("gallery");
        const viewer = document.getElementById("viewer");
        const bigImage = document.getElementById("bigImage");
        const downloadBtn = document.getElementById("download");

        let current = null;
        let blobURL = null;

        document.addEventListener("contextmenu", e => { if (e.target === bigImage) e.preventDefault(); });

        async function download(item) {
            if (!item || !item.url) return;
            try {
                downloadBtn.textContent = "⏳ Загрузка...";
                downloadBtn.classList.add("loading");
                const response = await fetch(item.url);
                if (!response.ok) throw new Error();
                const blob = await response.blob();
                if (blobURL) URL.revokeObjectURL(blobURL);
                blobURL = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = blobURL;
                a.download = `${item.img_id || "BING_IMAGE"}.jpg`;
                document.body.appendChild(a); a.click(); a.remove();
            } catch { alert("Ошибка загрузки"); } finally {
                downloadBtn.textContent = "Скачать UHD";
                downloadBtn.classList.remove("loading");
            }
        }

        function openViewer(item) {
            current = item;
            bigImage.src = item.url;
            viewer.classList.add("active");
        }

        function closeViewer() {
            viewer.classList.remove("active");
            bigImage.src = "";
            current = null;
        }

        fetch("data.json?" + Date.now())
            .then(r => r.json())
            .then(data => {
                Object.values(data).sort((a,b) => b.sort_key.localeCompare(a.sort_key)).forEach(item => {
                    const card = document.createElement("div"); card.className = "card";
                    const img = document.createElement("img"); 
                    img.src = item.preview; img.loading = "lazy";
                    img.onload = () => img.classList.add("loaded");
                    const overlay = document.createElement("div"); overlay.className = "overlay";
                    card.append(img, overlay);
                    overlay.onclick = () => openViewer(item);
                    gallery.append(card);
                });
            }).catch(() => gallery.innerHTML = "<p style='text-align:center'>Ошибка загрузки архива</p>");

        downloadBtn.onclick = () => download(current);
        document.getElementById("close").onclick = closeViewer;
        viewer.onclick = e => { if (e.target === viewer) closeViewer(); };
        document.onkeydown = e => { if (e.key === "Escape") closeViewer(); };
    </script>
</body>
</html>
