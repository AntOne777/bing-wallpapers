<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горизонт | Bing Archive</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: #050505; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        h1 { text-align: center; margin: 40px 0; font-weight: 200; letter-spacing: 0.2em; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { position: relative; overflow: hidden; border-radius: 8px; background: #1e1e1e; height: 220px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: 0.3s; display: block; }
        .card:hover .card-img { transform: scale(1.05); }

        .info { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .card:hover .info { opacity: 1; }
        
        .title, .desc-text, .date { user-select: text !important; cursor: text; pointer-events: auto; }
        .title { font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .desc-text { font-size: 11px; color: #ccc; margin: 5px 0; }
        .date { font-size: 10px; color: #888; }

        .lightbox { 
            position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.95); 
            z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95%; max-height: 75%; object-fit: contain; }
        
        .close { position: absolute; right: 30px; top: 20px; font-size: 40px; background: none; border: 0; color: white; cursor: pointer; }
        
        .download-btn {
            margin-top: 20px; padding: 12px 24px; background: #0078d4; 
            color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        .download-btn:hover { background: #005a9e; }
    </style>
</head>
<body>

    <h1>Горизонт</h1>
    <div class="grid" id="gallery"></div>

    <div class="lightbox" id="viewer">
        <button class="close" id="close">×</button>
        <img id="bigImage" alt="Full view">
        <button class="download-btn" id="downloadBtn">Скачать UHD</button>
    </div>

    <script>
        const gallery = document.getElementById("gallery");
        const viewer = document.getElementById("viewer");
        const bigImage = document.getElementById("bigImage");
        const downloadBtn = document.getElementById("downloadBtn");
        
        let currentItem = null;

        function openViewer(item) {
            currentItem = item;
            bigImage.src = item.url;
            viewer.classList.add("active");
        }

        function closeViewer() {
            viewer.classList.remove("active");
            bigImage.src = "";
            currentItem = null;
        }

        // Логика скачивания
        downloadBtn.onclick = async () => {
            if (!currentItem) return;
            const response = await fetch(currentItem.url);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `${currentItem.img_id}.jpg`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
        };

        fetch("data.json?" + Date.now())
            .then(r => r.json())
            .then(data => {
                Object.values(data).sort((a, b) => b.sort_key.localeCompare(a.sort_key)).forEach(item => {
                    const card = document.createElement("div"); card.className = "card";
                    const img = document.createElement("img"); 
                    img.className = "card-img";
                    img.src = item.preview;
                    img.onclick = () => openViewer(item);
                    
                    const info = document.createElement("div"); info.className = "info";
                    info.innerHTML = `<div class="title">${item.img_id}</div><div class="desc-text">${item.description}</div><div class="date">${item.date}</div>`;
                    
                    card.append(img, info);
                    gallery.append(card);
                });
            });

        document.getElementById("close").onclick = closeViewer;
        viewer.onclick = e => { if (e.target === viewer) closeViewer(); };
        document.onkeydown = e => { if (e.key === "Escape") closeViewer(); };
    </script>
</body>
</html>
