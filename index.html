<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Личный архив Bing Wallpaper UHD">
    <meta name="theme-color" content="#121212">
    <title>Горизонт | Bing Archive</title>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: #121212; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        h1 { text-align: center; margin: 60px 0; font-weight: 200; letter-spacing: .5em; text-transform: uppercase; font-size: 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { position: relative; overflow: hidden; border-radius: 8px; background: #1e1e1e; cursor: pointer; }
        .card img { width: 100%; height: 220px; object-fit: cover; opacity: 0; transition: .3s; display: block; }
        .card img.loaded { opacity: 1; }
        .overlay { position: absolute; inset: 0; z-index: 10; }
        .info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 15px 15px; background: linear-gradient(transparent, rgba(0,0,0,.9)); opacity: 0; transition: .3s; pointer-events: none; }
        .card:hover .info { opacity: 1; }
        .title { font-size: 13px; text-transform: uppercase; }
        .date { font-size: 10px; color: #aaa; margin-top: 5px; }

        .lightbox { position: fixed; inset: 0; display: none; background: rgba(0,0,0,.95); justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        .lightbox.active { display: flex; }
        .lightbox img { 
            max-width: 95%; max-height: 80%; object-fit: contain; 
            user-select: none; -webkit-user-drag: none; -webkit-touch-callout: none; pointer-events: auto; 
            transition: opacity 0.3s ease;
        }
        .close { position: absolute; right: 35px; top: 25px; font-size: 40px; background: none; border: 0; color: white; cursor: pointer; }
        .controls { margin-top: 20px; }
        button { background: #222; color: white; border: 0; padding: 10px 20px; cursor: pointer; transition: .3s; }
        button:hover { background: #0078d4; }
    </style>
</head>
<body>

    <h1>Горизонт</h1>
    <div class="grid" id="gallery"></div>

    <div class="lightbox" id="viewer">
        <button class="close" id="close">×</button>
        <img id="bigImage">
        <div class="controls">
            <button id="download">Скачать UHD</button>
        </div>
    </div>

    <script>
        const gallery = document.getElementById("gallery");
        const viewer = document.getElementById("viewer");
        const bigImage = document.getElementById("bigImage");
        const downloadBtn = document.getElementById("download");

        let current = null;
        let blobURL = null;

        document.addEventListener("contextmenu", e => {
            if (e.target === bigImage) e.preventDefault();
        });

        async function download(item) {
            if (!item || !item.url) return;
            try {
                downloadBtn.textContent = "Загрузка...";
                const response = await fetch(item.url);
                if (!response.ok) throw new Error();
                const blob = await response.blob();
                
                if (blobURL) URL.revokeObjectURL(blobURL);
                blobURL = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = blobURL;
                a.download = `${item.img_id || "BING_IMAGE"}.jpg`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch {
                alert("Ошибка загрузки");
            } finally {
                downloadBtn.textContent = "Скачать UHD";
                setTimeout(() => {
                    if (blobURL) {
                        URL.revokeObjectURL(blobURL);
                        blobURL = null;
                    }
                }, 2000);
            }
        }

        function openViewer(item) {
            current = item;
            bigImage.src = item.url;
            bigImage.style.opacity = 1;
            viewer.classList.add("active");
        }

        function closeViewer() {
            viewer.classList.remove("active");
            bigImage.src = "";
            current = null;
        }

        fetch("data.json?" + Date.now())
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(data => {
                // Сортировка: новые записи с самым поздним sort_key первыми
                const sortedItems = Object.values(data).sort((a, b) => 
                    b.sort_key.localeCompare(a.sort_key)
                );

                sortedItems.forEach(item => {
                    const card = document.createElement("div"); card.className = "card";
                    const img = document.createElement("img"); 
                    img.src = item.preview; img.loading = "lazy";
                    img.onload = () => img.classList.add("loaded");

                    const overlay = document.createElement("div"); overlay.className = "overlay";
                    const info = document.createElement("div"); info.className = "info";
                    const title = document.createElement("div"); title.className = "title";
                    title.textContent = item.img_id || "";
                    const date = document.createElement("div"); date.className = "date";
                    date.textContent = item.date || "";
                    info.append(title, date);
                    card.append(img, overlay, info);
                    overlay.onclick = () => openViewer(item);
                    gallery.append(card);
                });
            })
            .catch(() => {
                gallery.innerHTML = "<p style='text-align:center'>Ошибка загрузки архива</p>";
            });

        downloadBtn.onclick = () => download(current);
        document.getElementById("close").onclick = closeViewer;
        viewer.onclick = e => { if (e.target === viewer) closeViewer(); };
        document.onkeydown = e => { if (e.key === "Escape") closeViewer(); };
    </script>
</body>
</html>
