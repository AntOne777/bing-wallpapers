<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Архив Bing Обоев в 4K</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #f5f5f5; }
        .filters { text-align: center; margin-bottom: 30px; }
        button { background: #222; color: #ccc; border: 1px solid #444; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 6px; font-size: 14px; transition: all 0.3s ease; }
        button:hover, button.active { background: #0078d4; color: white; border-color: #0078d4; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 0 10px; }
        .card { background: #1e1e1e; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 12px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card-img-link { cursor: zoom-in; display: block; }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #252525; display: block; }
        .card-content { padding: 18px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; line-height: 1.4; }
        .card-date { font-size: 12px; color: #0078d4; font-weight: bold; margin-bottom: 8px; }
        .card-copy { font-size: 12px; color: #aaa; margin-bottom: 15px; min-height: 32px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .download-btn { display: block; text-align: center; background: #0078d4; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: bold; transition: background 0.2s; }
        .download-btn:hover { background: #005a9e; }
        #no-data { text-align: center; color: #888; font-size: 18px; margin-top: 5px; display: none; }

        /* Стили для красивого полноэкранного просмотра (Lightbox) */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            opacity: 0;
            transition: opacity 0.3s ease;
            justify-content: center;
            align-items: center;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox-img {
            max-width: 95%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .lightbox.active .lightbox-img {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 25px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        .lightbox-close:hover {
            color: #0078d4;
        }
    </style>
</head>
<body>

    <h1>Архив обоев Bing в 4K</h1>
    
    <div class="filters">
        <button onclick="filterMarket('ALL')" id="btn-ALL" class="active">Все страны</button>
        <button onclick="filterMarket('en-US')" id="btn-en-US">США</button>
        <button onclick="filterMarket('zh-CN')" id="btn-zh-CN">Китай</button>
        <button onclick="filterMarket('ja-JP')" id="btn-ja-JP">Япония</button>
        <button onclick="filterMarket('de-DE')" id="btn-de-DE">Германия</button>
        <button onclick="filterMarket('fr-FR')" id="btn-fr-FR">Франция</button>
        <button onclick="filterMarket('ru-RU')" id="btn-ru-RU">Россия</button>
    </div>

    <div id="no-data">В этом регионе пока нет сохраненных обоев.</div>
    <div class="grid" id="gallery"></div>

    <!-- Элементы полноэкранного окна -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Полноэкранный просмотр">
    </div>

    <script>
        let allData = {};

        fetch('data.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                allData = data;
                renderGallery('ALL');
            })
            .catch(err => {
                console.error("Ошибка загрузки базы данных:", err);
                document.getElementById('gallery').innerHTML = '<p style="text-align:center; color:red;">Ошибка загрузки данных.</p>';
            });

        function renderGallery(market) {
            const gallery = document.getElementById('gallery');
            const noData = document.getElementById('no-data');
            gallery.innerHTML = '';
            
            const keys = Object.keys(allData).sort().reverse();
            let hasItems = false;

            keys.forEach(key => {
                const item = allData[key];
                if (!item) return;
                
                if (market !== 'ALL' && item.market !== market) return;
                hasItems = true;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-link" onclick="openLightbox('${item.url}')">
                        <img src="${item.url}" alt="${item.title}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="card-date">${item.date} [${item.market.toUpperCase()}]</div>
                        <div class="card-title">${item.title || 'Bing Wallpaper'}</div>
                        <div class="card-copy">${item.copyright || ''}</div>
                        <a href="${item.url}" target="_blank" class="download-btn" download>Скачать в 4K UHD</a>
                    </div>
                `;
                gallery.appendChild(card);
            });

            noData.style.display = hasItems ? 'none' : 'block';
        }

        function filterMarket(mkt) {
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + mkt).classList.add('active');
            renderGallery(mkt);
        }

        // Функции для управления полноэкранным просмотром
        function openLightbox(url) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = url;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Отключаем прокрутку сайта на фоне
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // Возвращаем прокрутку
        }

        // Закрытие по кнопке Esc
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
