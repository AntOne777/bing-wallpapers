<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Личный архив Bing Wallpaper в UHD">
    <meta name="theme-color" content="#121212">
    <title>Горизонт | Архивы Bing</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        h1 { text-align: center; margin: 60px 0; font-family: 'Segoe UI', sans-serif; font-weight: 200; letter-spacing: 0.5em; text-transform: uppercase; color: #ffffff; font-size: 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { position: relative; background: #1e1e1e; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; height: 220px; object-fit: cover; opacity: 0; transition: opacity 0.3s; display: block; }
        .card img.loaded { opacity: 1; }
        .card-overlay { position: absolute; top:0; left:0; width:100%; height:100%; z-index:10; }
        
        .card-info { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 40px 15px 15px; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
        .card:hover .card-info { opacity: 1; }
        .card-title { font-size: 13px; font-weight: 300; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
        .card-date { font-size: 10px; color: #aaa; text-transform: uppercase; }

        .lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .lightbox.active { display: flex; flex-direction: column; }
        .lightbox-img { max-width: 95%; max-height: 80%; opacity: 0; transition: opacity 0.3s; object-fit: contain; background: transparent; }
        .lightbox-img.loaded { opacity: 1; }
        
        .close-btn { position: absolute; top: 25px; right: 35px; background: none; border: none; color: white; font-size: 40px; cursor: pointer; z-index: 1001; }
        .lightbox-controls { margin-top: 20px; display: flex; gap: 20px; align-items: center; }
        .btn-download { cursor: pointer; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 4px; font-size: 12px; text-transform: uppercase; transition: 0.3s; }
        .btn-download:hover { background: rgba(0, 120, 212, 0.8); }
    </style>
</head>
<body>
    <h1>Горизонт</h1>
    <div class="grid" id="gallery"></div>
    
    <div id="lightbox" class="lightbox">
        <button class="close-btn" id="close-btn" title="Закрыть">×</button>
        <img class="lightbox-img" id="lightbox-img">
        <div class="lightbox-controls">
            <div id="file-label" style="font-size: 10px; opacity: 0.5; font-family: monospace;"></div>
            <button class="btn-download" id="download-btn">Скачать UHD</button>
        </div>
    </div>

    <script>
        const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lightbox-img'),
              dlBtn = document.getElementById('download-btn'), lbl = document.getElementById('file-label');
        let currentBlobUrl = null;

        const close = () => { lb.classList.remove('active'); lbImg.src=""; lbImg.classList.remove('loaded'); if(currentBlobUrl){ URL.revokeObjectURL(currentBlobUrl); currentBlobUrl=null; } };

        fetch('data.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                Object.values(data).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const img = document.createElement('img');
                    img.src = item.preview; img.loading = "lazy"; img.decoding = "async";
                    img.onload = () => img.classList.add('loaded');
                    if(img.complete) img.classList.add('loaded');
                    
                    const overlay = document.createElement('div'); overlay.className = 'card-overlay';
                    const info = document.createElement('div'); info.className = 'card-info';
                    
                    if(item.title) {
                        const t = document.createElement('div'); t.className = 'card-title'; t.textContent = item.title;
                        info.append(t);
                    }
                    const d = document.createElement('div'); d.className = 'card-date'; 
                    d.textContent = `${item.date || ""} ${(item.markets || []).join(' • ')}`;
                    info.append(d);
                    
                    card.append(img, overlay, info);
                    
                    overlay.onclick = (e) => {
                        e.preventDefault();
                        lbImg.classList.remove('loaded');
                        const safeTitle = (item.title || "BingImage").replace(/\s+/g, '').replace(/[\\/:*?"<>|]/g, '');
                        lbl.textContent = `${safeTitle}.jpg`;
                        
                        const preload = new Image();
                        preload.onload = () => {
                            lbImg.src = item.url;
                            lb.classList.add('active');
                            lbImg.classList.add('loaded');
                        };
                        preload.onerror = () => { lbImg.src = item.url; lb.classList.add('active'); };
                        preload.src = item.url;
                        
                        dlBtn.onclick = async () => {
                            dlBtn.textContent = "Загрузка...";
                            try {
                                const r = await fetch(item.url);
                                const b = await r.blob();
                                if(currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                                currentBlobUrl = URL.createObjectURL(b);
                                const a = document.createElement('a');
                                a.href = currentBlobUrl; a.download = lbl.textContent; a.click();
                            } catch(e) { alert("Ошибка при загрузке"); }
                            finally { dlBtn.textContent = "Скачать UHD"; }
                        };
                    };
                    document.getElementById('gallery').append(card);
                });
            });

        document.getElementById('close-btn').onclick = close;
        lb.onclick = (e) => { if(e.target === lb) close(); };
        document.onkeydown = (e) => { if(e.key === "Escape") close(); };
    </script>
</body>
</html>
